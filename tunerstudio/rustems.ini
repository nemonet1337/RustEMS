; RustEMS TunerStudio definition
;
; This INI matches the firmware's device-side protocol
; (engine-core/src/comms) and the live output-channel byte layout
; (engine-core/src/comms/output.rs). Connect over the USART1 serial port
; (115200 8N1) exposed by the firmware comms task.
;
; NOTE: The constants page is a 256-byte RAM page; individual tunable fields
; are not yet mapped to the live EngineConfig (read/write/burn operate at the
; byte level for now). Output channels (live gauges) are fully wired.

[MegaTune]
   signature = "rusEFI RustEMS 2026.05"

[TunerStudio]
   queryCommand   = "S"
   versionInfo    = "V"
   signature      = "rusEFI RustEMS 2026.05"
   ; big-endian wire format, CRC32-framed packets
   endianness     = big
   noCommandIsBlocking = true

[Constants]
   endianness     = big
   nPages         = 1
   pageSize       = 256
   pageIdentifier = "\x00\x00"

   ; Protocol command templates (match engine-core/src/comms):
   ;   read:  'R' page(2) offset(2) count(2)
   ;   write: 'C' page(2) offset(2) value(n)
   ;   burn:  'B'
   pageReadCommand     = "R%2i%2o%2c"
   pageValueWrite      = "C%2i%2o%v"
   pageChunkWrite      = "C%2i%2o%2c%v"
   burnCommand         = "B"
   pageActivationDelay = 50

   page = 1
   ; Tunable fields will be declared here once the page is mapped to
   ; EngineConfig. Until then the page is a raw 256-byte scratch area.

[OutputChannels]
   ; Live data block: 'O' offset(2) count(2) -> [0x00] data(ochBlockSize)
   ochGetCommand = "O%2o%2c"
   ochBlockSize  = 20

   ;            class,  type, offset, units,  scale,  translate
   rpm        = scalar, U16,   0,     "RPM",  1.0,    0.0
   clt        = scalar, S16,   2,     "C",    0.1,    0.0
   iat        = scalar, S16,   4,     "C",    0.1,    0.0
   map        = scalar, U16,   6,     "kPa",  0.1,    0.0
   tps        = scalar, U16,   8,     "%",    0.1,    0.0
   battery    = scalar, U16,  10,     "V",    0.01,   0.0
   lambda     = scalar, U16,  12,     "",     0.001,  0.0
   injPulse   = scalar, U16,  14,     "ms",   0.01,   0.0
   advance    = scalar, S16,  16,     "deg",  0.1,    0.0
   statusBits = scalar, U08,  18,     "",     1.0,    0.0

   sparkCut   = bits,   U08,  18, [0:0]
   sequential = bits,   U08,  18, [1:1]

[GaugeConfigurations]
   gaugeCategory = "Engine"
   tachGauge    = rpm,     "Engine Speed", "RPM",   0, 8000, 500, 1000, 6500, 7500, 0, 0
   cltGauge     = clt,     "Coolant",      "C",   -40,  120, -10,    0,  105,  120, 0, 0
   iatGauge     = iat,     "Intake Air",   "C",   -40,  120, -10,    0,   60,   90, 0, 0
   mapGauge     = map,     "MAP",          "kPa",   0,  250,   0,    0,  200,  240, 0, 0
   tpsGauge     = tps,     "Throttle",     "%",     0,  100,   0,    0,  100,  100, 0, 0
   battGauge    = battery, "Battery",      "V",     8,   16,  10,   12,   15,   16, 1, 1
   lambdaGauge  = lambda,  "Lambda",       "",    0.6,  1.5, 0.7, 0.85, 1.05,  1.2, 2, 2
   advGauge     = advance, "Advance",      "deg", -10,   50,   0,    0,   40,   45, 0, 0

[FrontPage]
   gauge1 = tachGauge
   gauge2 = mapGauge
   gauge3 = cltGauge
   gauge4 = iatGauge
   gauge5 = lambdaGauge
   gauge6 = battGauge
   gauge7 = tpsGauge
   gauge8 = advGauge

[Datalog]
   ;       channel,  label,     type, format
   entry = rpm,      "RPM",      int,    "%d"
   entry = clt,      "CLT",      float,  "%.1f"
   entry = iat,      "IAT",      float,  "%.1f"
   entry = map,      "MAP",      float,  "%.1f"
   entry = tps,      "TPS",      float,  "%.1f"
   entry = battery,  "Battery",  float,  "%.2f"
   entry = lambda,   "Lambda",   float,  "%.3f"
   entry = injPulse, "InjPulse", float,  "%.2f"
   entry = advance,  "Advance",  float,  "%.1f"
