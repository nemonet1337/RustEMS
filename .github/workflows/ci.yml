name: CI

on:
  push:
    branches: ["main", "master", "claude/**"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-host
      - name: Clippy (PC crates)
        run: |
          cargo clippy -p rusefi-protocol --lib
          cargo clippy -p rusefi-client   --lib
          cargo clippy -p rusefi-cli      --lib
          cargo clippy -p rusefi-codegen  --lib
          cargo clippy -p rusefi-sim      --features cyl-4,fuel-fi
          cargo clippy -p rusefi-core     --features cyl-4,fuel-fi --lib

  clippy-embedded:
    name: Clippy (embedded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-embedded
      - name: Clippy (STM32 firmware — default features)
        run: cargo clippy -p rusefi-stm32 --target thumbv7em-none-eabihf

  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-host
      - name: Run tests
        run: |
          cargo test -p rusefi-core     --features cyl-4,fuel-fi --lib
          cargo test -p rusefi-protocol --lib
          cargo test -p rusefi-client   --lib

  build-sim:
    name: Build simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-sim
      - run: cargo build -p rusefi-sim --features cyl-4,fuel-fi

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-cli
      - run: cargo build -p rusefi-cli

  build-stm32:
    name: Build STM32 firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - board: microRusEFI (STM32F407, 4-cyl FI)
            features: stm32f4,cyl-4,fuel-fi
          - board: Proteus (STM32F767, 6-cyl FI)
            features: stm32f7,cyl-6,fuel-fi
          - board: uaEFI (STM32F407, 4-cyl FI)
            features: uaefi,cyl-4,fuel-fi
          - board: Huge (STM32F407, 8-cyl FI)
            features: stm32f4-huge,cyl-8,fuel-fi
          - board: Nano (STM32F407, 2-cyl FI)
            features: stm32f4-nano,cyl-2,fuel-fi
    name: Build STM32 — ${{ matrix.board }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          key: stm32-${{ matrix.features }}
      - name: Build
        run: |
          cargo build -p rusefi-stm32 \
            --target thumbv7em-none-eabihf \
            --no-default-features \
            --features "${{ matrix.features }}"

  # Gate job: PRs must pass all checks before merge
  ci-pass:
    name: CI passed
    if: always()
    needs: [fmt, clippy, clippy-embedded, test, build-sim, build-cli, build-stm32]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | grep -qv '"result": "failure"' || exit 1
          echo "$results" | grep -qv '"result": "cancelled"' || exit 1
          echo "All CI checks passed"
