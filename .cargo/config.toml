[target.thumbv7em-none-eabihf]
runner = "probe-rs run --chip STM32F407VGTx"
rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

[alias]
# Build embedded firmware for ARM target
build-arm = "build --target thumbv7em-none-eabihf"
check-arm = "check --target thumbv7em-none-eabihf"
